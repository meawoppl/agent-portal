<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Agent Portal</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a1b26;
        --panel: #16161e;
        --text: #c0caf5;
        --muted: #7f849c;
        --accent: #7aa2f7;
        --border: #292e42;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
        background: var(--bg);
        color: var(--text);
        font: 15px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 360px);
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        color: var(--accent);
      }

      p {
        margin: 0;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Agent Portal</h1>
      <p>Opening the configured portal.</p>
    </main>
  </body>
</html>
