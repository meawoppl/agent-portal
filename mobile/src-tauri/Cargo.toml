# This crate is its own workspace root (empty `[workspace]` table below) so it
# is fully self-contained and never pulled into the repo's main workspace — see
# the `[workspace] exclude` note in the root Cargo.toml and mobile/README.md.
[workspace]

[package]
name = "portal-mobile"
version = "0.1.0"
description = "Agent Portal mobile shell (remote-URL WebView, Tauri 2)"
authors = ["Matthew Goodman <d3a6d0cec0c16f3e@inboxnegative.com>"]
edition = "2021"
# NOTE: This crate is intentionally EXCLUDED from the root workspace (see the
# root Cargo.toml `[workspace] exclude` and mobile/README.md). Desktop Tauri
# links webkit2gtk (Linux) and needs the mobile SDK/NDK toolchains, none of
# which the main CI/build environment provides. Keeping it out of the workspace
# guarantees `cargo build/test/clippy --workspace` are unaffected. F1/F2 add
# dedicated mobile CI lanes and can promote it to a member once the mobile
# toolchain is provisioned.

# The library holds the app logic so it can be reused as the mobile
# entry point (Android/iOS build a shared library, not a binary).
[lib]
name = "portal_mobile_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
# This feature is used to allow Tauri's `dev`/`build` machinery to toggle the
# custom protocol; it mirrors the default generated by `create-tauri-app`.
custom-protocol = ["tauri/custom-protocol"]
