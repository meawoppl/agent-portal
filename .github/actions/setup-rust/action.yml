name: Setup Rust
description: >
  Install the pinned Rust toolchain (with a clean rustup install on macOS),
  set up dependency caching, and optionally install protoc and trunk.

inputs:
  cache-key:
    description: Shared key for Swatinem/rust-cache
    required: true
  components:
    description: Comma-separated rustup components (e.g. clippy, rustfmt)
    required: false
    default: ""
  targets:
    description: Comma-separated extra compilation targets (e.g. wasm32-unknown-unknown)
    required: false
    default: ""
  protoc:
    description: Install protobuf-compiler via apt (Linux runners only)
    required: false
    default: "false"
  trunk:
    description: Install trunk via cargo
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install protoc
      if: inputs.protoc == 'true'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Install Rust
      if: runner.os != 'macOS'
      uses: dtolnay/rust-toolchain@1.92.0
      with:
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    # Some `macos-14` runner image variants ship a broken Rust setup where
    # the files at `~/.cargo/bin/{cargo,rustc}` are actually `rustup-init`
    # rather than the toolchain shims. `dtolnay/rust-toolchain` exits 0 on
    # these images but the resulting install is still broken. Nuke any
    # prior state and do a clean rustup install. See #678.
    - name: Install Rust via rustup (clean install)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        rm -rf "$HOME/.cargo" "$HOME/.rustup"
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | sh -s -- -y --default-toolchain 1.92.0 --profile minimal
        if [ -n "${{ inputs.components }}" ]; then
          "$HOME/.cargo/bin/rustup" component add $(echo "${{ inputs.components }}" | tr ',' ' ')
        fi
        if [ -n "${{ inputs.targets }}" ]; then
          "$HOME/.cargo/bin/rustup" target add $(echo "${{ inputs.targets }}" | tr ',' ' ')
        fi
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.cache-key }}

    - name: Install trunk
      if: inputs.trunk == 'true'
      shell: bash
      run: cargo install trunk --locked
