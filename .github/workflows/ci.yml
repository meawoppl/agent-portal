name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    name: Lint Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check migration naming convention
        run: ./scripts/check-migration-names.sh

      - name: Check production Rust does not use json! macro
        run: python3 ./scripts/check-no-json-macro.py

  lint-css:
    name: CSS Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run stylelint
        run: npm run lint:css

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  build-frontend:
    name: Build Frontend (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "frontend"
          targets: wasm32-unknown-unknown
          trunk: "true"

      - name: Build frontend
        run: cd frontend && trunk build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist (required for backend embed)
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "clippy"
          components: clippy
          protoc: "true"

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist (required for backend embed)
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "backend"
          protoc: "true"

      - name: Build backend
        run: cargo build -p backend -p claude-portal -p shared

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist (required for backend embed)
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "test"
          protoc: "true"

      - name: Run tests
        run: cargo test --workspace

  build-binaries:
    name: ${{ matrix.job-name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - job-name: Build Proxy (Linux x86_64)
            runner: ubuntu-latest
            package: claude-portal
            binary: claude-portal
            cache-key: proxy-linux
            artifact: proxy-linux-x86_64
          - job-name: Build Proxy (Linux aarch64)
            runner: ubuntu-24.04-arm
            package: claude-portal
            binary: claude-portal
            cache-key: proxy-linux-aarch64
            artifact: proxy-linux-aarch64
          - job-name: Build Proxy (macOS ARM64)
            runner: macos-14
            package: claude-portal
            binary: claude-portal
            cache-key: proxy-macos-arm64
            artifact: proxy-darwin-aarch64
          - job-name: Build Proxy (Windows x86_64)
            runner: windows-latest
            package: claude-portal
            binary: claude-portal.exe
            cache-key: proxy-windows
            artifact: proxy-windows-x86_64
          - job-name: Build Launcher (Linux x86_64)
            runner: ubuntu-latest
            package: agent-portal
            binary: agent-portal
            cache-key: launcher-linux
            artifact: launcher-linux-x86_64
          - job-name: Build Launcher (Linux aarch64)
            runner: ubuntu-24.04-arm
            package: agent-portal
            binary: agent-portal
            cache-key: launcher-linux-aarch64
            artifact: launcher-linux-aarch64
          - job-name: Build Launcher (macOS ARM64)
            runner: macos-14
            package: agent-portal
            binary: agent-portal
            cache-key: launcher-macos-arm64
            artifact: launcher-darwin-aarch64
          - job-name: Build Launcher (Windows x86_64)
            runner: windows-latest
            package: agent-portal
            binary: agent-portal.exe
            cache-key: launcher-windows
            artifact: launcher-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: ${{ matrix.cache-key }}

      - name: Build ${{ matrix.package }}
        shell: bash
        run: cargo build -p ${{ matrix.package }} --release

      - name: Ad-hoc code sign
        if: runner.os == 'macOS'
        run: codesign -s - target/release/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/${{ matrix.binary }}
