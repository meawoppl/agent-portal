name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    name: Lint Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check migration naming convention
        run: ./scripts/check-migration-names.sh

      - name: Check production Rust does not use json! macro
        run: python3 ./scripts/check-no-json-macro.py

  lint-css:
    name: CSS Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/lint/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run stylelint
        run: npm run lint:css

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  build-frontend:
    name: Build Frontend (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "frontend"
          targets: wasm32-unknown-unknown
          trunk: "true"

      - name: Build frontend
        run: cd frontend && trunk build

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stub frontend dist
        # Backend embeds frontend/dist at build time, but memory_serve falls
        # back to dynamic loading when it is empty. CI compile/test checks do
        # not need the real bundle, so stub it instead of depending on (and
        # waiting for) build-frontend. Keeps backend lanes independent of
        # frontend/CSS failures (#1165 item 1).
        run: mkdir -p frontend/dist

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "clippy"
          components: clippy
          protoc: "true"

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stub frontend dist
        # Backend embeds frontend/dist at build time, but memory_serve falls
        # back to dynamic loading when it is empty. CI compile/test checks do
        # not need the real bundle, so stub it instead of depending on (and
        # waiting for) build-frontend. Keeps backend lanes independent of
        # frontend/CSS failures (#1165 item 1).
        run: mkdir -p frontend/dist

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "backend"
          protoc: "true"

      - name: Build backend
        run: cargo build -p backend -p claude-portal -p shared

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stub frontend dist
        # Backend embeds frontend/dist at build time, but memory_serve falls
        # back to dynamic loading when it is empty. CI compile/test checks do
        # not need the real bundle, so stub it instead of depending on (and
        # waiting for) build-frontend. Keeps backend lanes independent of
        # frontend/CSS failures (#1165 item 1).
        run: mkdir -p frontend/dist

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "test"
          protoc: "true"

      - name: Run tests
        run: cargo test --workspace

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Dedicated job for DB-backed integration tests (#1209 item 1). Kept
    # separate from `Tests` so only the harness — which self-migrates a fresh
    # Postgres — runs against a DB; the main test lane stays DB-free.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: claude_portal
          POSTGRES_USER: claude_portal
          POSTGRES_PASSWORD: dev_password_change_in_production
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claude_portal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Stub frontend dist
        run: mkdir -p frontend/dist

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "e2e"
          protoc: "true"

      - name: Run E2E harness
        env:
          DATABASE_URL: postgresql://claude_portal:dev_password_change_in_production@localhost:5432/claude_portal
        run: cargo test -p backend --test harness

  build-binaries:
    name: ${{ matrix.job-name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - job-name: Build Proxy (Linux x86_64)
            runner: ubuntu-latest
            package: claude-portal
            binary: claude-portal
            cache-key: proxy-linux
            artifact: proxy-linux-x86_64
          - job-name: Build Proxy (Linux aarch64)
            runner: ubuntu-24.04-arm
            package: claude-portal
            binary: claude-portal
            cache-key: proxy-linux-aarch64
            artifact: proxy-linux-aarch64
          - job-name: Build Proxy (macOS ARM64)
            runner: macos-14
            package: claude-portal
            binary: claude-portal
            cache-key: proxy-macos-arm64
            artifact: proxy-darwin-aarch64
          - job-name: Build Proxy (Windows x86_64)
            runner: windows-latest
            package: claude-portal
            binary: claude-portal.exe
            cache-key: proxy-windows
            artifact: proxy-windows-x86_64
          - job-name: Build Launcher (Linux x86_64)
            runner: ubuntu-latest
            package: agent-portal
            binary: agent-portal
            cache-key: launcher-linux
            artifact: launcher-linux-x86_64
          - job-name: Build Launcher (Linux aarch64)
            runner: ubuntu-24.04-arm
            package: agent-portal
            binary: agent-portal
            cache-key: launcher-linux-aarch64
            artifact: launcher-linux-aarch64
          - job-name: Build Launcher (macOS ARM64)
            runner: macos-14
            package: agent-portal
            binary: agent-portal
            cache-key: launcher-macos-arm64
            artifact: launcher-darwin-aarch64
          - job-name: Build Launcher (Windows x86_64)
            runner: windows-latest
            package: agent-portal
            binary: agent-portal.exe
            cache-key: launcher-windows
            artifact: launcher-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: ${{ matrix.cache-key }}

      - name: Build ${{ matrix.package }}
        shell: bash
        run: cargo build -p ${{ matrix.package }} --release

      - name: Ad-hoc code sign
        if: runner.os == 'macOS'
        run: codesign -s - target/release/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/${{ matrix.binary }}
