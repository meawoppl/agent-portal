name: Container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Container
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so build.rs commit-count version is real (#1096)

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "container-build"
          targets: wasm32-unknown-unknown
          protoc: "true"
          trunk: "true"

      - name: Build frontend
        run: cd frontend && trunk build

      - name: Build backend (embeds frontend assets)
        run: cargo build --release -p backend

      - name: Prepare build artifacts
        run: |
          mkdir -p build-output
          cp target/release/backend build-output/

      - name: Log in to Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker metadata
        id: meta
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAME,,}"
          short_sha="${GITHUB_SHA::7}"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "tags<<EOF"
            echo "${image}:${short_sha}"
            echo "${image}:latest"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.created=${created}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
