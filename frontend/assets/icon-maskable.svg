<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Full-bleed background so a maskable crop (circle/squircle/rounded) never
       exposes transparent corners; globe scaled to sit inside the 80% safe zone. -->
  <rect width="512" height="512" fill="#1a1b26"/>
  <g transform="translate(256 256) scale(0.74) translate(-256 -256)">
    <g filter="url(#glow-soft)" opacity="0.3">
      <circle cx="256" cy="256" r="180" fill="none" stroke="#7aa2f7" stroke-width="5"/>
    </g>
    <g filter="url(#glow)">
      <circle cx="256" cy="256" r="160" fill="none" stroke="#7aa2f7" stroke-width="4" opacity="0.9"/>
      <ellipse cx="256" cy="256" rx="160" ry="30" fill="none" stroke="#7aa2f7" stroke-width="3.5" opacity="0.7"/>
      <ellipse cx="256" cy="256" rx="90" ry="160" fill="none" stroke="#7aa2f7" stroke-width="3.5" opacity="0.85"/>
      <ellipse cx="256" cy="256" rx="35" ry="160" fill="none" stroke="#7aa2f7" stroke-width="3" opacity="0.6"/>
      <ellipse cx="256" cy="256" rx="140" ry="70" fill="none" stroke="#7aa2f7" stroke-width="3" opacity="0.4" transform="rotate(-25 256 256)"/>
      <ellipse cx="256" cy="256" rx="130" ry="55" fill="none" stroke="#7aa2f7" stroke-width="2.5" opacity="0.3" transform="rotate(20 256 256)"/>
    </g>
  </g>
</svg>
