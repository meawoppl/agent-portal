<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Open Graph / Link Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Agent Portal" />

    <!-- Twitter Card -->

    <meta name="twitter:title" content="Agent Portal" />
    <meta name="twitter:description" content="Rich, interactive agent sessions. Visually pleasant and easy to multitask between many sessions." />
    <meta name="twitter:image" content="https://txcl.io/og-preview.svg" />

    <!-- General meta -->
    <meta name="description" content="Rich, interactive agent sessions. Visually pleasant and easy to multitask between many sessions." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />

    <!-- KaTeX for rendering LaTeX math in messages -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
          integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous" />

    <!-- Loading spinner (inline so it renders before any external assets) -->
    <style>
        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #1a1b26;
            color: #7f849c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.95rem;
            gap: 1.2rem;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #292e42;
            border-top-color: #7aa2f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <link data-trunk rel="rust" data-wasm-opt="z" />

    <link data-trunk rel="css" href="styles/base.css" />

    <link data-trunk rel="css" href="styles/settings.css" />
